{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset - Portfolio Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#06b6d4',
                    }
                }
            }
        }
    </script>
    <link href="https://use.fontawesome.com/releases/v6.5.1/css/all.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
        .dark .glass-card {
            background: rgba(17, 24, 39, 0.95);
        }
        .input-field:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }
        .btn-reset {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            transition: all 0.3s ease;
        }
        .btn-reset:hover {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }
        .floating-shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
    </style>
</head>
<body class="min-h-screen gradient-bg flex items-center justify-center p-4">
    <div class="floating-shape w-64 h-64 -top-20 -left-20" style="animation-delay: 0s;"></div>
    <div class="floating-shape w-48 h-48 top-1/4 -right-10" style="animation-delay: 2s;"></div>
    <div class="floating-shape w-32 h-32 bottom-1/4 -left-10" style="animation-delay: 4s;"></div>
    
    <div class="glass-card w-full max-w-md rounded-3xl shadow-2xl p-8 relative z-10">
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto bg-gradient-to-br from-primary to-secondary rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-primary/30">
                <i class="fas fa-key text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Reset Password</h1>
            <p class="text-gray-500 dark:text-gray-400">Enter your email to receive reset link</p>
        </div>

        {% if form.errors %}
        <div class="mb-6 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl">
            <div class="flex items-center gap-3 text-red-600 dark:text-red-400">
                <i class="fas fa-exclamation-circle"></i>
                <span class="font-medium">{{ form.errors }}</span>
            </div>
        </div>
        {% endif %}

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="id_email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    <i class="fas fa-envelope mr-2 text-primary"></i>Email Address
                </label>
                <div class="relative">
                    <input type="email" name="email" id="id_email" required
                        class="input-field w-full px-4 py-3 pl-12 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:border-primary transition-all"
                        placeholder="Enter your email address"
                        autocomplete="email">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
            </div>

            <button type="submit" class="btn-reset w-full py-4 text-white font-semibold rounded-xl flex items-center justify-center gap-2">
                <i class="fas fa-paper-plane"></i>
                Send Reset Link
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="/admin/login/" class="inline-flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400 hover:text-primary transition-colors">
                <i class="fas fa-arrow-left"></i>
                Back to Login
            </a>
        </div>

        <div class="mt-6 pt-6 border-t border-gray-200 dark:border-gray-700 text-center">
            <p class="text-xs text-gray-400">
                <i class="fas fa-shield-alt mr-1"></i>
                Secured by Django Authentication
            </p>
        </div>
    </div>

    <script>
        if (localStorage.theme === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
